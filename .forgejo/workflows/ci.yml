name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 1"

jobs:
  checks:
    name: Static, query, and rollup checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: npm ci

      - name: Static and unit checks
        run: npm run test:ci

      - name: Runner Docker readiness
        run: |
          docker version
          docker info

      - name: External energy validation
        shell: bash
        run: |
          args=()
          if [ "${ENERGY_VALIDATION_STRICT:-}" = "1" ]; then
            args+=(--require-cache tibber-vm --require-cache tibber-influx --require-cache vrm)
            if [ -n "${ENERGY_VALIDATION_VM_BASE_URL:-}" ]; then
              args+=(--vm-base-url "$ENERGY_VALIDATION_VM_BASE_URL" --require-cache vrm-vm)
            fi
          fi
          if [ "${#args[@]}" -gt 0 ]; then
            npm run test:energy-validation -- "${args[@]}"
          else
            npm run test:energy-validation
          fi

      - name: Dashboard query readback
        run: npm run test:query-readback

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Grafana render smoke E2E
        run: npm run test:render-e2e

      - name: Rollup disposable E2E
        run: npm run test:rollup-e2e
