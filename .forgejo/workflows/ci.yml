name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 1"

jobs:
  checks:
    name: Static, query, and rollup checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: npm ci

      - name: Static and unit checks
        run: npm run test:ci

      - name: External energy validation
        run: npm run test:energy-validation

      - name: Dashboard query readback
        run: npm run test:query-readback

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Grafana render smoke E2E
        run: npm run test:render-e2e

      - name: Rollup disposable E2E
        run: npm run test:rollup-e2e
